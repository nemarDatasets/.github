name: Run Generate Archive

# Central archive-generation workflow for NEMAR datasets.
#
# Replaces the per-repo `.github/workflows/generate-archive.yml` that
# previously shipped to every dataset repo via `deployWorkflows()` in
# nemarOrg/nemar-cli. Phase 3 of nemarOrg/nemar-cli#601 (sub-issue #608).
# Sibling to `run-enrichment.yml` (Phase 1) and `run-version-doi.yml`
# (Phase 2).
#
# The legacy template was already `repository_dispatch`-driven, so this
# move is the lowest-friction of the centralization phases: the Worker
# helper `triggerArchiveGeneration` just retargets its POST URL from
# `repos/nemarDatasets/<dataset_id>/dispatches` to
# `repos/nemarDatasets/.github/dispatches` and adds `dataset_id` to the
# payload alongside the existing `version` field.
#
# Behavior is functionally identical to the legacy template — stream
# annex content directly from S3 into a zip and upload to
# `nemar/<dataset_id>/archives/v<X.Y.Z>.zip` via multipart upload, so
# disk usage stays constant regardless of dataset size.

on:
  repository_dispatch:
    types: [generate-archive]
  workflow_dispatch:
    inputs:
      dataset_id:
        description: "Dataset id (e.g. nm099999)"
        required: true
        type: string
      version:
        description: "Version (X.Y.Z, no leading v)"
        required: true
        type: string
      force:
        description: "Rebuild even if the archive already exists (recover a partial/corrupt zip)"
        required: false
        default: false
        type: boolean
      callback_url:
        description: "Callback URL (defaults to api.nemar.org/webhooks/archive-ready)"
        required: false
        type: string
        default: "https://api.nemar.org/webhooks/archive-ready"

# Dedupe concurrent dispatches for the same (dataset, version). cancel-in-progress
# false so a duplicate doesn't kill an in-flight build mid-multipart (the partial
# cleanup + idempotency guard handle a re-run); the duplicate queues behind.
concurrency:
  group: generate-archive-${{ github.event.client_payload.dataset_id || inputs.dataset_id }}-${{ github.event.client_payload.version || inputs.version }}
  cancel-in-progress: false

jobs:
  # Preflight (#752): datasets over the size/file-count policy skip the zip build
  # entirely and steer users to the range-resumable per-file direct download.
  # Runs before the expensive checkout/stream job so an oversized set never spins
  # a 60-min-capped build that can't finish. Mirrors backend archive-policy.ts.
  preflight:
    name: Archive size preflight
    runs-on: ubuntu-latest
    permissions: {}
    env:
      DATASET_ID: ${{ github.event.client_payload.dataset_id || inputs.dataset_id }}
      VERSION: ${{ github.event.client_payload.version || inputs.version }}
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Check archive size policy
        id: check
        env:
          CALLBACK_TOKEN: ${{ secrets.NEMAR_WEBHOOK_TOKEN }}
          CALLBACK_URL: ${{ github.event.client_payload.callback_url || inputs.callback_url || 'https://api.nemar.org/webhooks/archive-ready' }}
        run: |
          set -euo pipefail
          if [ -z "$DATASET_ID" ] || [ -z "$VERSION" ]; then
            echo "::error::Missing dataset_id/version"
            exit 1
          fi
          # Mirror backend services/archive-policy.ts (ARCHIVE_MAX_BYTES = 100 GiB,
          # ARCHIVE_MAX_FILES = 200000). Keep these in lockstep with that module.
          MAX_BYTES=$((100 * 1024 * 1024 * 1024))
          MAX_FILES=200000
          MANIFEST_URL="https://data.nemar.org/${DATASET_ID}/v${VERSION}/manifest.json"
          # Fail OPEN: if the manifest can't be read, build anyway (the 60-min cap
          # is the backstop) rather than skip every archive on a transient blip.
          # ::error:: (not warning) so a transient 404 that lets a doomed build
          # through is VISIBLE in the run, even though the job itself succeeds.
          if ! curl -fsS --connect-timeout 10 --max-time 120 "$MANIFEST_URL" -o /tmp/manifest.json; then
            echo "::error::manifest unavailable at $MANIFEST_URL; proceeding to build (size guard skipped)"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Guard the jq sums against an unexpected manifest shape: a non-array
          # would make `length`/`.[].size` silently yield 0 -> under-threshold ->
          # the very build we meant to skip. Fail OPEN + visibly instead.
          if [ "$(jq -r 'type' /tmp/manifest.json 2>/dev/null || echo invalid)" != "array" ]; then
            echo "::error::manifest is not a JSON array; proceeding to build (size guard skipped)"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BYTES=$(jq '[.[].size // 0] | add // 0' /tmp/manifest.json)
          FILES=$(jq 'length' /tmp/manifest.json)
          echo "total: ${BYTES} bytes, ${FILES} files (limits ${MAX_BYTES} bytes / ${MAX_FILES} files)"
          REASON=""
          if [ "$BYTES" -gt "$MAX_BYTES" ]; then
            GB=$(awk "BEGIN{printf \"%.1f\", ${BYTES}/1073741824}")
            REASON="dataset ${GB} GB exceeds 100.0 GB archive limit; use direct download"
          elif [ "$FILES" -gt "$MAX_FILES" ]; then
            REASON="dataset ${FILES} files exceeds ${MAX_FILES} archive limit; use direct download"
          fi
          if [ -z "$REASON" ]; then
            echo "Under archive limits; building zip."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::notice::Skipping archive build: ${REASON}"
          echo "skip=true" >> "$GITHUB_OUTPUT"
          if [ -z "$CALLBACK_TOKEN" ]; then
            echo "::warning::NEMAR_WEBHOOK_TOKEN unset; cannot record skipped state"
            exit 0
          fi
          jq -nc --arg id "$DATASET_ID" --arg v "$VERSION" --arg r "$REASON" \
            '{dataset_id:$id,status:"skipped",version:$v,reason:$r}' > /tmp/skip.json
          HTTP=$(curl -sS -o /tmp/skip-resp.json -w "%{http_code}" --connect-timeout 10 --max-time 30 \
            -X POST "$CALLBACK_URL" -H "Content-Type: application/json" \
            -H "X-Webhook-Token: $CALLBACK_TOKEN" -d @/tmp/skip.json) || HTTP=0
          echo "skip callback HTTP ${HTTP}: $(cat /tmp/skip-resp.json 2>/dev/null || true)"
          if [ "$HTTP" -lt 200 ] || [ "$HTTP" -ge 300 ]; then
            # FAIL the job (don't exit 0): if we skip the build but never record
            # archive_skip_reason, the dataset is a silent dead-end (NULL status +
            # NULL reason = "missing archive" forever). A red preflight is visible
            # and re-runnable; the gated archive job is skipped on a failed dep, so
            # there's no doomed build. Re-run is idempotent (re-skips, re-POSTs).
            echo "::error::skip callback failed (HTTP ${HTTP}); failing so archive_skip_reason is not silently dropped"
            exit 1
          fi

  archive:
    name: Generate Dataset Archive
    needs: preflight
    if: needs.preflight.outputs.skip != 'true'
    runs-on: ubuntu-latest
    # Streaming archive completes in single-digit minutes for typical
    # datasets; even a 250 GB upload finishes well under 30. Cap at 60
    # so a hung S3 multipart can't pin the runner indefinitely.
    timeout-minutes: 60
    # Defense-in-depth — every authenticated call goes through the
    # per-repo App token or the AWS credentials. The default
    # GITHUB_TOKEN is never used.
    permissions: {}
    env:
      DATASET_ID: ${{ github.event.client_payload.dataset_id || inputs.dataset_id }}
      VERSION: ${{ github.event.client_payload.version || inputs.version }}
    steps:
      - name: Validate inputs
        run: |
          set -euo pipefail
          if [ -z "$DATASET_ID" ]; then
            echo "::error::Missing dataset_id"
            exit 1
          fi
          case "$DATASET_ID" in
            nm[0-9][0-9][0-9][0-9][0-9][0-9]|on[0-9][0-9][0-9][0-9][0-9][0-9]|xx[0-9][0-9][0-9][0-9][0-9][0-9]) ;;
            *)
              echo "::error::Invalid dataset_id shape: $DATASET_ID (expected nm/on/xx + 6 digits)"
              exit 1
              ;;
          esac
          if [ -z "$VERSION" ]; then
            echo "::error::Missing version"
            exit 1
          fi
          # Reject a leading v (the S3 key is constructed as v<bare> below);
          # callers must pass the bare X.Y.Z form, matching the legacy
          # per-repo workflow's expectation and the Worker's
          # triggerArchiveGeneration contract.
          case "$VERSION" in
            v*)
              echo "::error::Pass version without leading v (got $VERSION)"
              exit 1
              ;;
          esac

      - name: Mint per-repo App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.NEMAR_APP_ID }}
          private-key: ${{ secrets.NEMAR_APP_PRIVATE_KEY }}
          owner: nemarDatasets
          repositories: ${{ env.DATASET_ID }}

      - name: Checkout target dataset repo at version tag
        uses: actions/checkout@v4
        with:
          repository: nemarDatasets/${{ env.DATASET_ID }}
          ref: v${{ env.VERSION }}
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install streaming dependencies
        run: |
          set -euo pipefail
          # The project policy (nemarOrg/nemar-cli CLAUDE.md) is bun for
          # all JS/TS work; ubuntu-latest doesn't ship bun, hence the
          # setup-bun step above. The archive script itself still runs
          # under Node 20 because the legacy CommonJS streaming script
          # targets it — bun is used only as the package installer here,
          # then NODE_PATH points `node` at the resulting node_modules.
          # Code-review #10.
          mkdir -p /tmp/archive-deps
          cd /tmp/archive-deps
          bun init -y > /dev/null
          # Pin to v7: v8+ is ESM-only, require() no longer returns the factory.
          bun add 'archiver@^7.0.1' '@aws-sdk/client-s3' '@aws-sdk/lib-storage'

      - name: Write archive script
        run: |
          cat > /tmp/stream-archive.js << 'ARCHIVE_SCRIPT'
          var fs = require("fs");
          var path = require("path");
          var S3Client = require("@aws-sdk/client-s3").S3Client;
          var GetObjectCommand = require("@aws-sdk/client-s3").GetObjectCommand;
          var Upload = require("@aws-sdk/lib-storage").Upload;
          var archiver = require("archiver");
          var PassThrough = require("stream").PassThrough;

          var DATASET_ID = process.env.DATASET_ID;
          var VERSION = process.env.VERSION;
          var BUCKET = "nemar";
          var REGION = process.env.AWS_DEFAULT_REGION || "us-east-2";

          function resolveAnnexKey(filePath) {
            try {
              var stat = fs.lstatSync(filePath);
              if (stat.isSymbolicLink()) {
                var target = fs.readlinkSync(filePath);
                var m = target.match(/([^\/]+)\/\1$/);
                if (m) return m[1];
                var m2 = target.match(/\/annex\/objects\/(.+)$/);
                if (m2) return m2[1];
              } else if (stat.isFile() && stat.size < 500 && stat.size > 20) {
                var content = fs.readFileSync(filePath, "utf8").trim();
                var m3 = content.match(/^\/annex\/objects\/(.+)$/);
                if (m3) return m3[1];
              }
            } catch (e) {
              console.warn("  resolveAnnexKey failed for " + filePath + ": " + e.message);
            }
            return null;
          }

          // Authenticated S3 read of an annex blob, with a small bounded
          // backoff for transient cold-start/throttle errors. Using signed
          // GetObject (the same AWS creds that write the zip) instead of an
          // anonymous public-URL GET removes the dependency on the dataset's
          // S3 public-access state: blobs read whether the prefix is public,
          // private, or mid-propagation right after a publish flip. This is
          // the bug behind the nm000111 incident (nemarOrg/nemar-cli#736),
          // where the publish cascade flipped public moments before this job
          // ran and every annexed blob 403'd against the not-yet-propagated
          // public policy, producing a hollow archive.
          //
          // The retry covers connect-time/HTTP errors (throttle, 5xx, 403/404)
          // since the body is not consumed until after this returns; a mid-
          // stream I/O error after archiver starts reading resp.Body instead
          // surfaces on the archive-level "error" handler (sets exitCode 1, job
          // fails red) rather than the per-file skip path.
          async function getAnnexObject(s3, key) {
            var lastErr;
            for (var attempt = 1; attempt <= 3; attempt++) {
              try {
                return await s3.send(new GetObjectCommand({ Bucket: BUCKET, Key: key }));
              } catch (e) {
                lastErr = e;
                if (attempt < 3) {
                  await new Promise(function (r) {
                    setTimeout(r, 500 * attempt);
                  });
                }
              }
            }
            throw lastErr;
          }

          function walkDir(dir, base) {
            base = base || "";
            var result = [];
            var entries = fs.readdirSync(dir, { withFileTypes: true });
            for (var i = 0; i < entries.length; i++) {
              var entry = entries[i];
              if (entry.name === ".git" || entry.name === ".github" || entry.name === "node_modules") continue;
              var rel = base ? base + "/" + entry.name : entry.name;
              var full = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                result = result.concat(walkDir(full, rel));
              } else {
                result.push({ rel: rel, full: full });
              }
            }
            return result;
          }

          async function main() {
            console.log("Streaming archive for " + DATASET_ID + " v" + VERSION);

            var archive = archiver("zip", { zlib: { level: 1 } });
            var passThrough = new PassThrough();
            archive.pipe(passThrough);

            archive.on("warning", function (err) {
              console.warn("Archive warning:", err.message);
            });
            archive.on("error", function (err) {
              console.error("Archive error:", err.message);
              process.exitCode = 1;
            });
            passThrough.on("error", function (err) {
              console.error("Stream error:", err.message);
              process.exitCode = 1;
            });

            var s3 = new S3Client({ region: REGION });
            var s3Key = DATASET_ID + "/archives/v" + VERSION + ".zip";

            var upload = new Upload({
              client: s3,
              params: {
                Bucket: BUCKET,
                Key: s3Key,
                Body: passThrough,
                ContentType: "application/zip",
              },
              // 6 parts in flight x 100 MB = ~600 MB buffered, comfortably under
              // the runner's memory; modestly faster than 4 for sub-threshold sets
              // now that >100 GB sets skip the build entirely (#752).
              queueSize: 6,
              partSize: 100 * 1024 * 1024,
            });

            var uploadDone = upload.done().catch(function (err) {
              console.error("S3 Upload error:", err.message);
              process.exitCode = 1;
              throw err;
            });

            var files = walkDir(".");
            console.log("Found " + files.length + " files");

            var annexed = 0;
            var regular = 0;
            var skipped = 0;

            for (var i = 0; i < files.length; i++) {
              var rel = files[i].rel;
              var full = files[i].full;
              var annexKey = resolveAnnexKey(full);

              try {
                var entryDone = new Promise(function (resolve, reject) {
                  archive.once("entry", resolve);
                  archive.once("error", reject);
                });
                if (annexKey) {
                  var resp = await getAnnexObject(s3, DATASET_ID + "/objects/" + annexKey);
                  archive.append(resp.Body, { name: rel });
                } else {
                  archive.append(fs.createReadStream(full), { name: rel });
                }
                await entryDone;
                if (annexKey) annexed++;
                else regular++;
              } catch (err) {
                skipped++;
                if (skipped <= 10) {
                  console.warn("  Skipping " + rel + ": " + err.message);
                } else if (skipped === 11) {
                  console.warn("  (suppressing further skip warnings)");
                }
              }

              if ((annexed + regular + skipped) % 100 === 0) {
                console.log("  Progress: " + (annexed + regular + skipped) + "/" + files.length);
              }
            }

            await archive.finalize();
            await uploadDone;

            console.log("Archive complete: " + annexed + " annexed + " + regular + " regular + " + skipped + " skipped");
            console.log("Uploaded to s3://" + BUCKET + "/" + s3Key);
            if (skipped > 0) {
              // A partial archive shouldn't silently become the
              // downloadable artifact for a published dataset version.
              // The fire-and-forget dispatch pattern means no callback
              // validates archive completeness — exit non-zero so the
              // Actions UI flags the run red and an operator investigates.
              // The S3 upload itself already finalized above (the
              // multipart Upload.done() returned), so the partial zip
              // IS on S3; the operator can choose to keep it or rerun
              // after fixing the missing annex objects. Code-review #10.
              console.error("::error::" + skipped + " annexed files were not found in S3; archive is incomplete");
              process.exitCode = 1;
            }
          }

          process.on("unhandledRejection", function (err) {
            console.error("Unhandled rejection:", err);
            process.exitCode = 1;
          });

          main().catch(function (err) {
            console.error("Fatal:", err);
            process.exitCode = 1;
          });
          ARCHIVE_SCRIPT

      - name: Stream archive to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-2
          NODE_PATH: /tmp/archive-deps/node_modules
        run: |
          set -euo pipefail
          # Idempotency guard (#670): skip the expensive re-download/re-zip/
          # re-upload if the archive already exists (a duplicate or manual
          # re-dispatch would otherwise rebuild it and could clobber the object
          # mid-stream). Normal publishes already dispatch this exactly once now
          # that the orchestrator's redundant generate_archive step was removed;
          # this is defense-in-depth. Use `force=true` (workflow_dispatch) to
          # rebuild over a partial/corrupt archive.
          FORCE="${{ github.event.client_payload.force || inputs.force || 'false' }}"
          KEY="${DATASET_ID}/archives/v${VERSION}.zip"
          if [ "$FORCE" = "true" ]; then
            echo "force=true -- rebuilding archive regardless of existing object."
          else
            # Capture stderr so a 403/5xx is reported as such instead of being
            # silently treated as "absent -> rebuild" with a misleading log.
            set +e
            head_out=$(aws s3api head-object --bucket nemar --key "$KEY" 2>&1)
            head_rc=$?
            set -e
            if [ "$head_rc" -eq 0 ]; then
              echo "Archive already exists at s3://nemar/$KEY -- skipping rebuild."
              exit 0
            elif echo "$head_out" | grep -qiE "Not Found|404|NoSuchKey"; then
              echo "No existing archive at s3://nemar/$KEY -- building."
            else
              echo "::warning::head-object on $KEY returned an unexpected error (rc=$head_rc); proceeding to rebuild. Detail: $head_out"
            fi
          fi
          # Delete-on-failure (nemarOrg/nemar-cli#739): the streaming script
          # finalizes whatever it managed to append and completes the multipart
          # upload BEFORE it exits non-zero on an incomplete build, so a failed
          # run leaves a partial zip at the canonical key. Combined with the
          # idempotency guard above, that partial would make every subsequent
          # dispatch a no-op until a human passes force=true. Remove it on any
          # non-zero exit so a re-dispatch rebuilds cleanly. The normal publish
          # path is protected by the skip-if-exists guard (it never overwrites a
          # good archive); only an explicit force=true rebuild can reach here
          # with a prior good object, and that is a deliberate recovery action.
          set +e
          node /tmp/stream-archive.js
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            echo "::warning::archive build failed (rc=$rc); removing any partial at s3://nemar/$KEY"
            aws s3 rm "s3://nemar/$KEY" || true
            exit "$rc"
          fi

      # Mirror of run-generate-zarr.yml's zarr-ready callback. Records the
      # latest-only archive state on the dataset's D1 row so the observability
      # dashboard (dashboard.nemar.org/observability) reports archive coverage
      # live, instead of only after the admin archive-sweep backfill.
      # (nemarOrg/nemar-cli#695 / #696.)
      - name: POST callback (archive-ready)
        id: post-success
        if: success()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-2
          CALLBACK_TOKEN: ${{ secrets.NEMAR_WEBHOOK_TOKEN }}
          CALLBACK_URL: ${{ github.event.client_payload.callback_url || inputs.callback_url || 'https://api.nemar.org/webhooks/archive-ready' }}
        run: |
          set -euo pipefail
          if [ -z "$CALLBACK_URL" ]; then
            echo "No callback URL configured; skipping callback POST"
            exit 0
          fi
          KEY="${DATASET_ID}/archives/v${VERSION}.zip"
          # The zip is present (just uploaded, or already existed on the
          # idempotent skip path). Read its size for datasets.archive_size; a
          # HEAD failure just omits the size (the Worker tolerates a null size).
          SIZE=$(aws s3api head-object --bucket nemar --key "$KEY" --query ContentLength --output text 2>/dev/null || echo "")
          if [ -n "$SIZE" ] && [ "$SIZE" != "None" ]; then
            printf '{"dataset_id":"%s","status":"ready","version":"%s","size":%s}' "$DATASET_ID" "$VERSION" "$SIZE" > /tmp/archive-callback.json
          else
            printf '{"dataset_id":"%s","status":"ready","version":"%s"}' "$DATASET_ID" "$VERSION" > /tmp/archive-callback.json
          fi
          # --connect-timeout/--max-time cap a hung Worker. On non-2xx capture the
          # body so the failure is unambiguous: the zip IS on S3, the Worker
          # refused the callback (auth, dataset-not-in-D1 -> 404, bad status).
          HTTP_STATUS=$(curl -sS -o /tmp/archive-callback-response.txt \
            -w "%{http_code}" \
            --connect-timeout 10 --max-time 30 \
            -X POST "$CALLBACK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Token: ${CALLBACK_TOKEN}" \
            --data @/tmp/archive-callback.json) || HTTP_STATUS="000"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error title=archive-ready callback rejected::Archive uploaded to S3 but the Worker callback at $CALLBACK_URL returned HTTP $HTTP_STATUS. NOT an archive failure. Response body follows."
            cat /tmp/archive-callback-response.txt || true
            echo
            exit 1
          fi
          echo "Callback POSTed to $CALLBACK_URL (HTTP $HTTP_STATUS, size=${SIZE:-unknown})"

      - name: POST failure callback (best-effort)
        # Only on a HARD failure (clone/install/stream crash, an incomplete
        # archive, or the success callback POST itself failing) -- so an
        # archive that didn't fully build is recorded as 'failed' rather than
        # silently advertised. Best-effort; tolerate a 404.
        if: failure() && steps.post-success.outcome != 'success'
        env:
          CALLBACK_TOKEN: ${{ secrets.NEMAR_WEBHOOK_TOKEN }}
          CALLBACK_URL: ${{ github.event.client_payload.callback_url || inputs.callback_url || 'https://api.nemar.org/webhooks/archive-ready' }}
        run: |
          set -euo pipefail
          printf '{"dataset_id":"%s","status":"failed","version":"%s"}' "$DATASET_ID" "$VERSION" > /tmp/archive-fail.json
          curl -sS --connect-timeout 10 --max-time 30 -X POST "$CALLBACK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Token: ${CALLBACK_TOKEN}" \
            --data @/tmp/archive-fail.json || true
