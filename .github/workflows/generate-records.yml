name: Generate Records

# Central Tier-1 record emitter for NEMAR dataset versions.
#
# Sibling to generate-manifest.yml. Where that workflow emits one
# VersionManifest + summary per dataset version, this one emits a JSON
# ARRAY of neuroschema v0.3.0 `record` documents -- one per primary signal
# file -- from a git-tree walk on a managed runner (no annex download, no
# biosigIO/MNE). Recording duration / sample counts come from the BIDS
# sidecar; absent ones are emitted as null for a Tier-2 backfill.
#
# This workflow lives at nemarDatasets/.github so its Actions minutes bill
# against the GitHub Team allowance.
#
# Triggered by:
#   - repository_dispatch[generate-records] from the Worker (production path)
#   - workflow_dispatch                      (manual recovery / re-run)
#
# Artifacts:
#   s3://nemar/<id>/version/v<X.Y.Z>-records.json   (records.json)
#
# Fully wired end to end (epic nemarOrg/nemar-cli#736, Phase 5 / #742): emit ->
# neuroschema-validate -> Tier-2 biosigIO duration patch -> S3 upload ->
# records-ready callback to api.nemar.org/webhooks/records-ready. Dispatched on
# publish by run-version-doi.yml's trigger-records job. records.json is an S3
# artifact served by the data plane (loadRecords); it is NOT committed back to
# the dataset repo.

on:
  repository_dispatch:
    types: [generate-records]
  workflow_dispatch:
    inputs:
      dataset_id:
        description: "Dataset id (e.g. nm099999)"
        required: true
        type: string
      version:
        description: "Version (X.Y.Z, no leading v)"
        required: true
        type: string
      callback_url:
        description: "Callback URL (defaults to api.nemar.org/webhooks/records-ready)"
        required: false
        type: string
        default: "https://api.nemar.org/webhooks/records-ready"

jobs:
  records:
    name: Generate Records
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATASET_ID: ${{ github.event.client_payload.dataset_id || inputs.dataset_id }}
      VERSION: ${{ github.event.client_payload.version || inputs.version }}
      # Pin to the released neuroschema so the validation step is reproducible.
      NEUROSCHEMA_VERSION: "0.3.0"
      AWS_DEFAULT_REGION: us-east-2
      S3_BUCKET: nemar
    steps:
      - name: Validate inputs
        id: validate
        run: |
          if [ -z "$DATASET_ID" ]; then
            echo "::error::Missing dataset_id"
            exit 1
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::Missing version"
            exit 1
          fi
          # Strip a stray leading v; S3 keys use the bare version.
          VERSION="${VERSION#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "TAG=v${VERSION}" >> "$GITHUB_ENV"
          echo "Inputs OK: dataset_id=${DATASET_ID} version=${VERSION}"

      - name: Checkout .github (for scripts/emit_records.py)
        id: checkout
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Mint GH App installation token for dataset repo
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.NEMAR_APP_ID }}
          private-key: ${{ secrets.NEMAR_APP_PRIVATE_KEY }}
          owner: nemarDatasets
          repositories: ${{ env.DATASET_ID }}

      - name: Shallow-clone dataset repo at tag
        id: clone
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          rm -rf /tmp/repo
          git clone --depth 1 --branch "$TAG" --no-checkout \
            "https://x-access-token:${GH_TOKEN}@github.com/nemarDatasets/${DATASET_ID}.git" \
            /tmp/repo
          echo "Cloned ${DATASET_ID}@${TAG} into /tmp/repo"

      - name: Emit records.json
        id: emit
        run: |
          set -euo pipefail
          mkdir -p /tmp/out
          python scripts/emit_records.py \
            --dataset-id "$DATASET_ID" \
            --version "$VERSION" \
            --repo-dir /tmp/repo \
            --out-dir /tmp/out
          echo "--- records.json head ---"
          head -c 2000 /tmp/out/records.json || true
          echo

      - name: Validate records.json against neuroschema v0.3.0
        id: validate-records
        run: |
          set -euo pipefail
          # The neuroschema validator (validate_document) operates on a SINGLE
          # object and routes it through the root envelope (doc_type 'record'
          # -> core/record.schema.json). records.json is an ARRAY, so we loop
          # and validate each element; feeding the whole array to the CLI would
          # fail with "[...] is not of type object". neuroschema is NOT on PyPI;
          # install it from the released git tag (pulls jsonschema) into an
          # isolated env so emit stays stdlib-only. The deprecated-RefResolver
          # DeprecationWarning on stderr is harmless and must not fail the step.
          python -m pip install --quiet \
            "neuroschema @ git+https://github.com/nemarOrg/neuroschema@v${NEUROSCHEMA_VERSION}"
          # neuroschema resolves its SCHEMA_DIR relative to the source tree
          # (../../../schema), which does not exist under site-packages on a clean
          # pip install -- the schema/*.json are not packaged as package-data. So
          # clone the tag for the schema/ dir and pass it via schema_dir explicitly.
          rm -rf /tmp/neuroschema-src
          git clone --depth 1 --branch "v${NEUROSCHEMA_VERSION}" \
            https://github.com/nemarOrg/neuroschema /tmp/neuroschema-src
          python - "/tmp/out/records.json" <<'PY'
          import json
          import sys
          from pathlib import Path

          from neuroschema.validate import validate_document

          SCHEMA_DIR = Path("/tmp/neuroschema-src/schema")  # cloned tag's schema/ dir
          docs = json.load(open(sys.argv[1]))
          assert isinstance(docs, list), "records.json must be a JSON array"
          bad = 0
          for i, doc in enumerate(docs):
              for err in validate_document(doc, schema_dir=SCHEMA_DIR):  # root -> record
                  bad += 1
                  path = ".".join(str(p) for p in err.absolute_path) or "(root)"
                  print(f"::error::[{i}] {path}: {err.message}")
          print(f"{'VALID' if bad == 0 else 'INVALID'}: {len(docs)} record(s), {bad} error(s)")
          sys.exit(1 if bad else 0)
          PY

      - name: Install biosigIO (Tier-2 duration reader)
        id: install-biosigio
        # Best-effort: Tier-2 duration fill is optional enrichment, so a
        # transient pip/PyPI failure must not fail the publish (the patch step
        # below skips itself when this didn't succeed). Uses `python -m pip`
        # (as the neuroschema-validate step above does) rather than the sister
        # zarr workflow's `uv pip`; biosigIO's EDF/BDF/SET/BrainVision path
        # needs no extra apt deps on ubuntu-latest.
        continue-on-error: true
        run: python -m pip install --quiet -r scripts/zarr/requirements.txt

      # --------------------------------------------------------------------
      # Upload the records.json snapshot to the per-version S3 key
      #   s3://nemar/<id>/version/v<X.Y.Z>-records.json
      # served by the data plane's GET /<id>/<version>/records.json route
      # (nemar-cli #706, epic #615 P2), then POST a records-ready callback to
      # the Worker for observability (epic #736 Phase 5 / #742). records.json is
      # an S3 artifact, not committed back to the dataset repo.
      # --------------------------------------------------------------------
      - name: Configure AWS credentials
        id: aws-creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Patch null durations via biosigIO (Tier-2, best-effort)
        id: patch-durations
        run: |
          set -euo pipefail
          if [ "${{ steps.install-biosigio.outcome }}" != "success" ]; then
            echo "::warning::biosigIO install failed; skipping Tier-2 duration patch (durations stay null)"
            exit 0
          fi
          # For the records whose BIDS sidecar lacked RecordingDuration (Tier-1
          # left recording_duration null), biosigIO full-reads the recording
          # (downloaded from S3 via the annex key) to fill duration + ntimes.
          # Best-effort: an unreadable/unsupported file stays null and does not
          # fail the run. No re-validate needed -- the patch only writes numbers
          # into signal_summary's number|null duration/ntimes fields, so it
          # cannot drift the neuroschema shape.
          python scripts/patch_duration.py \
            --records-path /tmp/out/records.json \
            --dataset-id "$DATASET_ID" \
            --version "$VERSION" \
            --repo-dir /tmp/repo
          echo "--- records.json head (post Tier-2) ---"
          head -c 1500 /tmp/out/records.json || true
          echo

      - name: Upload records.json to S3
        id: upload
        run: |
          set -euo pipefail
          RECORDS_KEY="${DATASET_ID}/version/${TAG}-records.json"
          aws s3 cp /tmp/out/records.json "s3://${S3_BUCKET}/${RECORDS_KEY}" \
            --content-type application/json \
            --region us-east-2
          echo "RECORDS_URL=https://${S3_BUCKET}.s3.us-east-2.amazonaws.com/${RECORDS_KEY}" >> "$GITHUB_ENV"

      # Tell the Worker the records.json artifact is on S3 so the observability
      # dashboard reflects records coverage (epic nemarOrg/nemar-cli#736 Phase 5
      # / #742). Mirror of run-generate-archive.yml's archive-ready callback. The
      # records.json artifact is served from S3 directly, so this is state-only.
      - name: POST callback (records-ready)
        id: post-success
        if: success()
        env:
          CALLBACK_TOKEN: ${{ secrets.NEMAR_WEBHOOK_TOKEN }}
          CALLBACK_URL: ${{ github.event.client_payload.callback_url || inputs.callback_url || 'https://api.nemar.org/webhooks/records-ready' }}
        run: |
          set -euo pipefail
          if [ -z "$CALLBACK_URL" ]; then
            echo "No callback URL configured; skipping callback POST"
            exit 0
          fi
          printf '{"dataset_id":"%s","status":"ready","version":"%s"}' "$DATASET_ID" "$VERSION" > /tmp/records-callback.json
          # --connect-timeout/--max-time cap a hung Worker. On non-2xx capture the
          # body so the failure is unambiguous: records.json IS on S3, the Worker
          # refused the callback (auth, dataset-not-in-D1 -> 404, bad status).
          HTTP_STATUS=$(curl -sS -o /tmp/records-callback-response.txt \
            -w "%{http_code}" \
            --connect-timeout 10 --max-time 30 \
            -X POST "$CALLBACK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Token: ${CALLBACK_TOKEN}" \
            --data @/tmp/records-callback.json) || HTTP_STATUS="000"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            # Best-effort: records.json IS on S3 and is served from there
            # directly, so the records-ready callback is observability-only. A
            # non-2xx (the endpoint not yet deployed during this epic's rollout,
            # the dataset not in D1, or a transient Worker hiccup) must NOT redden
            # a successful generation -- unlike archive-ready, whose callback is
            # strict. Warn so a persistently broken chain is still noticeable.
            echo "::warning title=records-ready callback non-2xx::records.json uploaded to S3 but the Worker callback at $CALLBACK_URL returned HTTP $HTTP_STATUS (observability-only; not failing the run). Response body follows."
            cat /tmp/records-callback-response.txt || true
            echo
            exit 0
          fi
          echo "Callback POSTed to $CALLBACK_URL (HTTP $HTTP_STATUS)"

      - name: POST failure callback (best-effort)
        # Only on a HARD failure (emit/validate/upload crash, or the success
        # callback POST itself failing) -- records a 'failed' state rather than
        # silently leaving the prior state. Best-effort; tolerate a 404.
        if: failure() && steps.post-success.outcome != 'success'
        env:
          CALLBACK_TOKEN: ${{ secrets.NEMAR_WEBHOOK_TOKEN }}
          CALLBACK_URL: ${{ github.event.client_payload.callback_url || inputs.callback_url || 'https://api.nemar.org/webhooks/records-ready' }}
        run: |
          set -euo pipefail
          printf '{"dataset_id":"%s","status":"failed","version":"%s"}' "$DATASET_ID" "$VERSION" > /tmp/records-fail.json
          curl -sS --connect-timeout 10 --max-time 30 -X POST "$CALLBACK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Token: ${CALLBACK_TOKEN}" \
            --data @/tmp/records-fail.json || true
