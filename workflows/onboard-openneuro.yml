# OpenNeuro Dataset Onboarding
#
# This workflow imports OpenNeuro datasets into NEMAR.
# Deploy to: nemarDatasets/.github/workflows/onboard-openneuro.yml
#
# Trigger manually with a comma-separated list of OpenNeuro dataset IDs.
# Each dataset is processed in parallel via matrix strategy.

name: Onboard OpenNeuro Dataset

on:
  workflow_dispatch:
    inputs:
      openneuro_ids:
        description: "Comma-separated OpenNeuro dataset IDs (e.g., ds007262,ds007263)"
        required: true
        type: string
      skip_data:
        description: "Skip S3 data copy (metadata only)"
        required: false
        type: boolean
        default: false

jobs:
  parse-ids:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
    steps:
      - name: Parse dataset IDs into matrix
        id: parse
        env:
          INPUT_IDS: ${{ inputs.openneuro_ids }}
        run: |
          # Validate all IDs match ds###### format
          for id in $(echo "$INPUT_IDS" | tr ',' ' '); do
            id=$(echo "$id" | xargs)
            if ! echo "$id" | grep -qE '^ds[0-9]{6}$'; then
              echo "::error::Invalid OpenNeuro ID: '$id'. Expected format: ds###### (e.g., ds007262)"
              exit 1
            fi
          done
          # Convert comma-separated to JSON array
          JSON=$(echo "$INPUT_IDS" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | jq -R . | jq -s -c .)
          echo "matrix={\"dataset_id\":$JSON}" >> "$GITHUB_OUTPUT"
          echo "Parsed datasets: $JSON"

  onboard:
    needs: parse-ids
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.parse-ids.outputs.matrix) }}
      fail-fast: false
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Install git-annex
        run: sudo apt-get update && sudo apt-get install -y git-annex

      - name: Configure git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Install nemar CLI
        run: npm install -g @nemarorg/nemar-cli

      - name: Authenticate nemar CLI
        env:
          NEMAR_API_KEY: ${{ secrets.NEMAR_ADMIN_API_KEY }}
        run: nemar auth login --key "$NEMAR_API_KEY"

      - name: Import dataset
        env:
          DATASET_ID: ${{ matrix.dataset_id }}
          SKIP_DATA: ${{ inputs.skip_data }}
        run: |
          ARGS="$DATASET_ID"
          if [ "$SKIP_DATA" = "true" ]; then
            ARGS="$ARGS --skip-data"
          fi
          nemar admin import-openneuro $ARGS
